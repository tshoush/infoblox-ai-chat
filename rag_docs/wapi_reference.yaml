  record:a:
    description: A DNS A record mapping a hostname to an IPv4 address.
    common_fields:
    - name
    - ipv4addr
    - view
    - ttl
    - comment
  record:host:
    description: A host record combining DNS and IPAM/DHCP for one or more addresses.
    common_fields:
    - name
    - ipv4addrs
    - configure_for_dns
    - view
  range:
    description: A DHCP range (pool of addresses) within a network.
    common_fields:
    - start_addr
    - end_addr
    - network
    - member
  fixedaddress:
    description: A DHCP fixed address reservation bound to a MAC address.
    common_fields:
    - ipv4addr
    - mac
    - network
    - name

title: Infoblox WAPI Reference
wapi_version: 2.12.3
overview: The Infoblox WAPI is a RESTful API over HTTPS. Each object type (e.g. 'network',
  'record:a', 'record:host') is queried at /wapi/<version>/<object>. Use GET to search/list,
  POST to create, PUT (against an object _ref) to modify, and DELETE (against a _ref)
  to remove. The 'supports' field on each attribute uses r=read, w=write(create),
  u=update, s=search.
